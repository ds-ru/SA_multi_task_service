name: Deploy to VM

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Deploy to VM
      uses: appleboy/ssh-action@v0.1.5
      with:
        host: ${{ secrets.VM_HOST }}
        username: ${{ secrets.VM_USER }}
        key: ${{ secrets.VM_SSH_KEY }}
        port: 22
        script: |
          cd ~/dir
          git pull origin master
          
          docker stop multi_service
          docker rm multi_service
          docker rmi multi_service
          
          docker build -t multi_service:latest .
          
          docker network create proxy_net || true
          
          docker run -d \
            --name multi_service \
            --restart unless-stopped \
            --network proxy_net \
            multi_service:latest
